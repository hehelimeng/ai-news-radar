name: Send Lark Daily Digest

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Shanghai.
    - cron: "0 1 * * *"

concurrency:
  group: lark-daily-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g @larksuite/cli

      - name: Configure lark-cli
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          test -n "$LARK_APP_ID"
          test -n "$LARK_APP_SECRET"
          printf '%s' "$LARK_APP_SECRET" | lark-cli config init --app-id "$LARK_APP_ID" --app-secret-stdin --brand feishu

      - name: Prepare OPML
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
          elif [ -f feeds/follow.example.opml ]; then
            cp feeds/follow.example.opml feeds/follow.opml
          fi

      - name: Refresh news data
        env:
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS || 10 }}
        run: |
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 21 --rss-opml feeds/follow.opml --rss-max-feeds "${RSS_MAX_FEEDS:-10}"
          else
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 21
          fi

      - name: Send digest to Lark
        env:
          LARK_USER_OPEN_ID: ${{ secrets.LARK_USER_OPEN_ID }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          LARK_DIGEST_TOP_N: ${{ vars.LARK_DIGEST_TOP_N || 8 }}
          AI_NEWS_RADAR_SITE_URL: https://${{ github.repository_owner }}.github.io/ai-news-radar/
        run: |
          python scripts/send_lark_digest.py
